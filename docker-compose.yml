version: "3.8"
services:
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
  app:
    build: .
    ports:
      - "3500:3000"
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/db
    depends_on:
      - db
